<!DOCTYPE html>
<html>

<head>

    <title>Smart Attendance System</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="main-container">

        <h1>Smart Attendance Management System</h1>

        <div class="container">

            <input type="text"
                   id="name"
                   placeholder="Student Name">

            <input type="text"
                   id="roll"
                   placeholder="Roll Number">

            <input type="text"
                   id="class"
                   placeholder="Class">

            <input type="date"
       id="date">

            <select id="status">

                <option value="Present">
                    Present
                </option>

                <option value="Absent">
                    Absent
                </option>

            </select>

            <div class="button-group">

                <button onclick="addStudent()">
                    Add Student
                </button>

                <button onclick="markAttendance()">
                    Mark Attendance
                </button>

            </div>

        </div>

        <div class="table-container">

            <h2>Student List</h2>

            <table>

                <thead>

                    <tr>

                        <th>Name</th>
                        <th>Roll No</th>
                        <th>Class</th>

                    </tr>

                </thead>

                <tbody id="studentTable">

                </tbody>

            </table>

        </div>

        <div class="table-container">

            <h2>Attendance Records</h2>

            <table>

                <thead>

                    <tr>

                        <th>Name</th>
                        <th>Roll No</th>
                        <th>Class</th>
                        <th>Status</th>

                    </tr>

                </thead>

                <tbody id="attendanceTable">

                </tbody>

            </table>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
